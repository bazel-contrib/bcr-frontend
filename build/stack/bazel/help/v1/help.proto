syntax = "proto3";

package build.stack.bazel.help.v1;

option go_package = "github.com/bazel-contrib/bcr-frontend/build/stack/bazel/help/v1;bhpb";

// BazelOption represents a Bazel command-line flag.
message BazelOption {
  // Flag name (e.g., 'compilation_mode', 'jobs')
  string name = 1;
  // Data type (e.g., 'string', 'int', 'boolean')
  string type = 2;
  // Default value
  string default = 3;
  // Help text description lines
  repeated string description = 4;
  // Whether the flag can be repeated
  bool repeatable = 5;
  // Whether the flag is a boolean toggle
  bool toggle = 6;
  // Short flag name (e.g., '-c' for '--compilation_mode')
  string short = 7;
  // Tag metadata
  repeated string tag = 8;
  // Bazel versions where this flag is available
  repeated string bazel_version = 9;
  // Categories this flag belongs to
  repeated string category = 10;
}

// BazelHelpCategory represents a category of Bazel flags.
message BazelHelpCategory {
  // Category title (e.g., 'Options for selecting the output format')
  string title = 1;
  // Flags in this category
  repeated BazelOption option = 2;
}

// BazelHelpCommand represents help output for a Bazel command.
message BazelHelpCommand {
    // Command name (e.g., 'build', 'test', 'run')
    string command = 1;
    // Flag categories for this command
    repeated BazelHelpCategory category = 2;
    // Usage lines
    repeated string usage = 3;
}

// BazelHelpParseMode indicates the parser state when parsing Bazel help output.
enum BazelHelpParseMode {
  // Parsing usage statement before categories
  USAGE = 0;
  // Parsing within a category
  CATEGORY = 1;
  // Parsing within a flag definition
  FLAG = 2;
}

// BazelHelpVersion represents help output for a Bazel version.
message BazelHelpVersion {
    // Bazel version
    string version = 1;
    // Commands in this version
    repeated BazelHelpCommand command = 2;
}

// BazelHelpRegistry is a collection of Bazel help data across versions.
message BazelHelpRegistry {
    repeated BazelHelpVersion version = 1;
}

// BazelFlag is a single command-line option aggregated across the bazel
// versions and subcommands where it appears. Produced by
// cmd/bazelflagdbcompiler from a BazelHelpRegistry.
message BazelFlag {
  // Canonical flag name (no leading "--").
  string name = 1;
  // Short single-character flag if any (e.g. "c" for --compilation_mode).
  string short = 2;
  // Type as reported by the latest version that exposes the flag.
  string type = 3;
  // Default value as reported by the latest version that exposes the flag.
  string default = 4;
  // True if --[no]<name> is the documented form.
  bool toggle = 5;
  // Description lines from the latest version that exposes the flag.
  repeated string description = 6;
  // Union of tags across all versions where the flag appears.
  repeated string tag = 7;
  // Indices into BazelFlagDb.bazel_versions where this flag is present.
  repeated int32 version_index = 8;
  // Indices into BazelFlagDb.commands of the bazel subcommands that accept
  // this flag (e.g. the entry for "build", "test", "query").
  repeated int32 command_index = 9;
  // Help category title from the latest version.
  string category = 10;
}

// BazelFlagDb is the per-flag inventory across multiple bazel versions.
message BazelFlagDb {
  // Shared bazel-version table that BazelFlag.version_index references.
  // Sorted ascending by semver.
  repeated string bazel_versions = 1;
  // All flags observed across every version, sorted alphabetically by name.
  repeated BazelFlag flag = 2;
  // Shared command-name table that BazelFlag.command_index references.
  // Sorted alphabetically.
  repeated string commands = 3;
}
