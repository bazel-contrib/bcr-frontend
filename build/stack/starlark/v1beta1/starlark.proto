syntax = "proto3";

// build.stack.starlark.v1 contains a protocol for representing Starlark modules
// and services for querying them.
package build.stack.starlark.v1beta1;

import "stardoc_output/stardoc_output.proto";

option java_package = "build.stack.starlark.v1beta1";
option java_outer_classname = "StarlarkProtos";
option go_package = "github.com/bazel-contrib/bcr-frontend/build/stack/starlark/v1beta1";

// ModuleCategory corresponds to corresponds to
// StarlarkDocumentationCategory.java.
enum ModuleCategory {
    MODULE_CATEGORY_UNKNOWN = 0;
    CONFIGURATION_FRAGMENT = 1;
    PROVIDER = 2;
    BUILTIN = 3;
    TOP_LEVEL_TYPE = 4;
    NONE = 5;
    CORE = 6;
    LOAD = 7;
}

message Position {
    int32 line = 1;
    int32 character = 2;
}

message SymbolLocation {
    Position start = 1;
    Position end = 2;
    string name = 3;
}

// The Module represents all documentation for a single Starlark file.
message Module {
    // the module name
    string name = 1;
    // the module category - corresponds to StarlarkDocumentationCategory.java.
    ModuleCategory category = 2;
    // Reserved field for removed ModuleInfo - all info now in typed wrapper fields below
    reserved 3;
    reserved "info";
    // the module filename, as an absolute path
    string filename = 4;
    // the symbol locations
    repeated SymbolLocation symbol_location = 5;
    // additional global scalars (string, int, bool)
    // Only includes public symbols (not starting with _) to reduce proto size
    map<string,Value> global = 6;
    // load statements
    repeated LoadStmt load = 7;
    // repository rules with locations
    repeated RepositoryRule repository_rule = 8;
    // module extensions with locations
    repeated ModuleExtension module_extension = 9;
    // macros with locations
    repeated Macro macro = 10;
    // extraction errors (e.g., malformed docstrings for individual symbols)
    repeated string error = 11;
    // functions with locations and wrapper info
    repeated Function function = 12;
    // the docstring present at the top of the input Starlark file
    string module_docstring = 13;
    // rules with locations
    repeated Rule rule = 14;
    // providers with locations
    repeated Provider provider = 15;
    // aspects with locations
    repeated Aspect aspect = 16;
    // rule macros - functions that wrap private rules
    repeated RuleMacro rule_macro = 17;
    // structs exported at top-level as namespaces (e.g., `paths = struct(...)`)
    repeated Struct struct = 18;
}

message Label {
    string repo = 1;
    string pkg = 2;
    string name = 3;
    // version optionally narrows augments the repo to a specific version
    string version = 4;
}

message LoadSymbol {
    string from = 1;
    string to = 2;
    SymbolLocation location = 3;
}

message LoadStmt {
    Label label = 1;
    repeated LoadSymbol symbol = 2;
    SymbolLocation location = 3;
}

message Rule {
    stardoc_output.RuleInfo info = 1;
    SymbolLocation location = 2;
    repeated Attribute attribute = 3;
}

message Aspect {
    stardoc_output.AspectInfo info = 1;
    SymbolLocation location = 2;
    repeated Attribute attribute = 3;
}

message Attribute {
    stardoc_output.AttributeInfo info = 1;
    SymbolLocation location = 2;
}

message Provider {
    stardoc_output.ProviderInfo info = 1;
    SymbolLocation location = 2;
    repeated ProviderField field = 3;
}

message ProviderField {
    stardoc_output.ProviderFieldInfo info = 1;
    SymbolLocation location = 2;
}

message Function {
    stardoc_output.StarlarkFunctionInfo info = 1;
    SymbolLocation location = 2;
    repeated FunctionParam param = 3;
    // Names of rules, aspects, and macros that this function calls.
    // This identifies "wrapper functions" (traditional Bazel macros) - functions
    // that primarily forward arguments to underlying rules or other macros.
    repeated string calls_rule_or_macro = 4;
    // Names of rules, aspects, and macros that receive **kwargs from this function.
    // This is a more specific indicator of the primary wrapping relationship.
    // For example, if `def my_macro(**kwargs): my_rule(**kwargs)`, then
    // forwards_kwargs_to will contain "my_rule".
    repeated string forwards_kwargs_to = 5;
    // Names of rules, aspects, and macros that receive the 'name' parameter from this function.
    // This provides a stronger signal for wrapper function detection by tracking explicit
    // name parameter forwarding. For example, if `def my_macro(name, **kwargs): my_rule(name=name, **kwargs)`,
    // then forwards_name_to will contain "my_rule". This includes cases where name is used in
    // expressions like `name=name + "_suffix"` (still references the name parameter).
    repeated string forwards_name_to = 6;
}

message FunctionParam {
    stardoc_output.FunctionParamInfo info = 1;
    SymbolLocation location = 2;
}

message Value {
    SymbolLocation location = 1;
    oneof value {
        string string = 2;
        int64 int = 3;
        bool bool = 4;
        MacroFunction macro = 5;
        ValueList list = 6;
        // type carries the type name of a non-callable Starlark value when no
        // concrete value can be represented in the oneof above. Used by the
        // @_builtins pseudo-module reshape to surface fields like
        // `native.existing_rules` or `cc_common.do_not_use_tools_cannot_be_manipulated_directly`
        // whose upstream proto records a type ("string", "dict[string, Label]", …)
        // but no scalar value. The frontend renders this as a type chip on the
        // symbol header.
        string type = 7;
    };
}

message ValueList {
    repeated Value value = 1;
}

message MacroFunction {
    repeated string kwargs_receiver = 1;
}

message RepositoryRule {
    stardoc_output.RepositoryRuleInfo info = 1;
    SymbolLocation location = 2;
    repeated Attribute attribute = 3;
}

message ModuleExtension {
    stardoc_output.ModuleExtensionInfo info = 1;
    SymbolLocation location = 2;
    repeated ModuleExtensionTagClass tag_class = 3;
}

message ModuleExtensionTagClass {
    stardoc_output.ModuleExtensionTagClassInfo info = 1;
    SymbolLocation location = 2;
    repeated Attribute attribute = 3;
}

message Macro {
    stardoc_output.MacroInfo info = 1;
    SymbolLocation location = 2;
    repeated Attribute attribute = 3;
}

// Struct represents a top-level `<name> = struct(...)` assignment in a .bzl
// file. This is the common "namespace" pattern used throughout bazel_skylib
// and similar libraries, where a public struct re-exports a related set of
// private functions or constants.
message Struct {
    // Exported name of the struct (e.g., "paths").
    string name = 1;
    // Where `<name> = struct(...)` was written.
    SymbolLocation location = 2;
    // Best-effort docstring derived from Sphinx-style `#:` doc comments on the
    // assignment, with the module-level docstring as a fallback.
    string doc_string = 3;
    // Fields in the order they appear in the struct() call.
    repeated StructField field = 4;
    // Origin file label, for IDE jump-to-definition.
    string origin_file = 5;
}

message StructField {
    // Field name as it appears on the struct (e.g., "basename").
    string name = 1;
    // Location of the `name = expr` entry inside the struct() call.
    SymbolLocation location = 2;
    // The referenced symbol's name in the defining module, if the RHS is a
    // simple Identifier (e.g., for `basename = _basename`, this is "_basename").
    // Empty when the RHS is a complex expression or literal.
    string target_symbol = 3;
    // The fully-qualified name a consumer would use to look up the field's
    // value (e.g., "paths.basename"). Always populated.
    string qualified_name = 4;
}

// RuleMacro is the case wherein a function forwards name and or kwargs to a
// rule. This is the familiar "macro" pattern, where "macro()" is now a first
// class citizen.
message RuleMacro {
    // function is the entrypoint callable (src)
    Function function = 1;
    // rule is the final resolved rule (dst)
    Rule rule = 2;
    // symbol is a list of resolved symbols that the function called, but not as
    // kwargs or name.
    repeated string symbol = 3;
    // loads represents the load statement that were used to resolve rule.
    repeated LoadStmt loads = 4;
}

// Package represents a parsed BUILD / BUILD.bazel file. Unlike Module (which
// describes rule *definitions* in a .bzl file), Package describes the rule
// *instances* (targets) that a BUILD file declares.
message Package {
    // Bazel package label without target — e.g., "@@repo//foo/bar".
    string name = 1;
    // Source filename, absolute path.
    string filename = 2;
    // Targets created by rule/macro calls in source order.
    repeated Target target = 3;
    // load statements used in the file.
    repeated LoadStmt load = 4;
    // Public top-level value bindings — e.g., `LIBS = ["a", "b"]`.
    map<string, Value> binding = 5;
    // The package(...) call's metadata if present.
    PackageDeclaration package_declaration = 6;
    // Symbol locations for IDE goto-definition.
    repeated SymbolLocation symbol_location = 7;
    // Extraction errors surfaced best-effort.
    repeated string error = 8;
}

// Target is a single rule/macro invocation at the top level of a BUILD file —
// for example, `cc_library(name = "foo", srcs = [...])`.
message Target {
    // The rule class invoked — "cc_library", "genrule", or a user macro name.
    string rule = 1;
    // The target's "name" attribute.
    string name = 2;
    // Where the call appears in source.
    SymbolLocation location = 3;
    // All keyword arguments passed to the rule/macro call. Captured
    // best-effort: literals become typed Values; complex expressions
    // map to FakeDeepStructure placeholders or are omitted.
    repeated TargetAttribute attribute = 4;
    // True when the call dispatched through a loaded macro (a user-defined
    // function from a .bzl file). False for native rules and rule()-defined
    // rule callables. Opaque: macro bodies are not expanded.
    bool is_macro = 5;
}

// TargetAttribute represents one keyword argument captured from a rule/macro
// call site in a BUILD file. Distinct from the top-level `Attribute` message
// (which wraps stardoc_output.AttributeInfo for rule *definitions*).
message TargetAttribute {
    string name = 1;
    Value value = 2;
    SymbolLocation location = 3;
}

// Optional package(...) metadata declared at the top of a BUILD file.
message PackageDeclaration {
    SymbolLocation location = 1;
    map<string, Value> attribute = 2;
}

// PackageInfoRequest mirrors ModuleInfoRequest but targets BUILD / BUILD.bazel.
message PackageInfoRequest {
    // Path or label of the BUILD file to evaluate.
    string target_file_label = 1;
    // Relative package path, for resolving relative labels.
    string rel = 2;
    // Search roots for transitive .bzl loads (same as ModuleInfoRequest).
    repeated string dep_roots = 3;
    // Optional in-memory content override for the target file.
    string file_content = 4;
    // Builtins bzl path for StarlarkSemantics (mirrors ModuleInfoRequest).
    string builtins_bzl_path = 5;
}

// ModuleRequest is a request for module information.
message ModuleInfoRequest {
    // target_file_label corresponds to the stardoc_binary --input argument.  Inputs are
    // typically bazel labels pointing to .bzl files, such as those used in load
    // statements.
    string target_file_label = 1;
    // Reserved field numbers for removed workspace-related fields that were never used
    reserved 2, 8, 9;
    reserved "workspace_name", "workspace_cwd", "workspace_output_base";
    // rel is the relative path of the package from the current workspace.  This is
    // needed for interpreting relative labels like `:utils.bzl`
    string rel = 3;
    // --symbol
    repeated string symbol_names = 4;
    // dep_roots are directory paths where files should be searched
    repeated string dep_roots = 5;
    // the builtins path for StarlarkSemantics
    string builtins_bzl_path = 6;
    // the content of the module to evaluate
    string module_content = 7;
}

message PingRequest { }

message PingResponse { }


// Starlark is a service that provides starlark language information.
service Starlark {
    // ModuleInfo services requests for ModuleInfo.
    rpc ModuleInfo(ModuleInfoRequest) returns (Module) {}
    // PackageInfo extracts target/macro/load info from a BUILD or BUILD.bazel file.
    rpc PackageInfo(PackageInfoRequest) returns (Package) {}
    // Ping allows connectivity checks
    rpc Ping(PingRequest) returns (PingResponse) {}
}
